<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja de computadores</title>

  <link rel="stylesheet" href="CSS/style_estrutura_pagina.css" />
  <link rel="stylesheet" href="CSS/style_formulario.css">

  <link rel="icon" href="imagens/icones/logo_loja.png.png" type="image/x-icon" />
</head>

<body>
  <main id="geral">
    <header id="cabecalho">
      <div id="logo">
        <a href="index.html">
          <img src="imagens/icones/logo_loja.png.png" alt="logo-loja" />
        </a>
      </div>
      <nav id="menu">
        <ul>
          <li>
            <a href="index.html" class="link_menu">Home</a>
          </li>
          <li><a href="cadastro.html" class="link_menu">Cadastro</a></li>
          <li><a href="sobre.html" class="link_menu">Sobre</a></li>
        </ul>
      </nav>

      <div id="div-icones">
        <ul>
          <li>
            <a href="paginas/login.html" class="link_icone"><img src="imagens/icones/download (3).png"
                alt="logo-login" /></a>
          </li>
          <li>
            <a href="carrinho.html" class="link_icone"><img src="imagens/icones/download (2).png"
                alt="logo-carrinho" /></a>
          </li>
        </ul>
      </div>
    </header>

    <section id="barra-pesquisa">
      <input type="text" name="pesquisa" id="pesquisa" placeholder="Digite seu produto" />
    </section>

    <section id="form">

      <form id="form-pessoa">
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" class="input01" required maxlength="60" placeholder="Seu nome">

        <label for="cpf">CPF</label>
        <input type="text" name="cpf" id="cpf" class="input01" required maxlength="14" placeholder="Digite seu cpf">

        <label for="data-nascimento">Data-nascimento</label>
        <input type="date" name="Data-nascimento" id="Data-nascimento" class="input01" required>

        <label for="Sexo"></label>
        <input type="radio" name="Sexo" id="sexoM" class="inputOP" value="M"> Masculino
        <input type="radio" name="Sexo" id="sexoF" class="inputOP" value="F"> Feminino
        <input type="radio" name="Sexo" id="sexoN" class="inputOP" value="N"> Não declarar

        <label for="cep">CEP</label>
        <input type="text" name="cep" id="cep" class="input02" required maxlength="9" placeholder="Digite seu CEP">

        <div id="div-dadso-endereco" class="oculto">

          <label for="logradouro">Logradouro</label>
          <input type="text" name="logradouro" id="logradouro" class="input01">

          <label for="num-residencia">Número</label>
          <input type="text" name="logradouro" id="logradouro" class="input02" maxlength="10"
            placeholder="Digite o número da residencia" required>

          <label for="complemento">Complemento</label>
          <input type="text" name="complemento-end" id="complemento-end" class="input01" maxlength="100"
            placeholder="Digite o número da residencia">

          <label for="bairro">Bairro</label>
          <input type="text" name="bairro" id="bairro" class="input01">

          <label for="localidade">Localidade</label>
          <input type="text" name="localidade" id="localidade" class="input01">

          <label for="uf">UF</label>
          <input type="text" name="uf" id="uf" class="input02">

        </div>

        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" class="input02" required maxlength="6"
          placeholder="Informe a senha">

        <div id="div-btns">
          <button type="submit" id="btn-add" class="input02">Cadastrar</button>
          <button type="reset" id="btn-limpar">limpar</button>
        </div>
      </form>

    </section>

    <footer id="rodape">
      <div id="dadosloja">
        <h2>Rua da creusa, 6767 - Bairro lagartixa</h2>
        <h1>Aracaju - Sergipe</h1>
      </div>

      <div id="icone_sociais">
        <ul>
          <li>
            <a href="https://www.instagram.com/seu_usuario"><img src="imagens/icones/instagram_logo.png"
                alt="instagram" /></a>
          </li>
          <li>
            <a href="https://www.facebook.com/seu_usuario"><img src="imagens/icones/facebook_logo.png"
                alt="facebook" /></a>
          </li>
        </ul>
        <!----->
        <div id="cartoes">
          <img src="imagens/icones/download.png" alt="hipercard" />
          <img src="imagens/icones/download.jpg" alt="mastercard" />
          <img src="imagens/icones/download (1).png" alt="visa" />
        </div>
      </div>
    </footer>
  </main>
</body>

</html>
