<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja de computadores</title>

  <link rel="stylesheet" href="CSS/style_estrutura_pagina.css" />
  <link rel="stylesheet" href="CSS/style_formulario.css">

  <link rel="icon" href="imagens/icones/logo_loja.png.png" type="image/x-icon" />
</head>

<body>
  <main id="geral">
    <header id="cabecalho">
      <div id="logo">
        <a href="index.html">
          <img src="imagens/icones/logo_loja.png.png" alt="logo-loja" />
        </a>
      </div>
      <nav id="menu">
        <ul>
          <li>
            <a href="index.html" class="link_menu">Home</a>
          </li>
          <li><a href="cadastro.html" class="link_menu">Cadastro</a></li>
          <li><a href="sobre.html" class="link_menu">Sobre</a></li>
        </ul>
      </nav>

      <div id="div-icones">
        <ul>
          <li>
            <a href="paginas/login.html" class="link_icone"><img src="imagens/icones/download (3).png"
                alt="logo-login" /></a>
          </li>
          <li>
            <a href="carrinho.html" class="link_icone"><img src="imagens/icones/download (2).png"
                alt="logo-carrinho" /></a>
          </li>
        </ul>
      </div>
    </header>

    <section id="barra-pesquisa">
      <input type="text" name="pesquisa" id="pesquisa" placeholder="Digite seu produto" />
    </section>

    <section id="form">

      <form id="form-pessoa">

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" class="input01" maxlength="60" placeholder="Digite seu nome" >

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" class="input01" maxlength="14" placeholder="000.000.000-00" required>

        <label for="data-nascimento">Data de nascimento</label>
        <input type="date" id="data-nascimento" name="data-nascimento" class="input01" >

        <label>Sexo</label>

        <div id="grupo-sexo">
            <label>
                <input type="radio" name="sexo" value="M">
                Masculino
            </label>
        
            <label>
                <input type="radio" name="sexo" value="F">
                Feminino
            </label>
        
            <label>
                <input type="radio" name="sexo" value="N">
                Não declarar
            </label>
        </div>

        <label for="cep">CEP</label>
        <input type="text" id="cep" name="cep" class="input02" maxlength="9" placeholder="00000-000">

        <div id="div-dados-endereco" class="oculto">

          <label for="logradouro">Logradouro</label>
          <input type="text" id="logradouro" name="logradouro" class="input01">

          <label for="numero">Número</label>
          <input type="text" id="numero" name="numero" class="input02" maxlength="10" placeholder="Número da residência"
            >

          <label for="complemento">Complemento</label>
          <input type="text" id="complemento" name="complemento" class="input01" maxlength="100"
            placeholder="Apartamento, bloco, etc.">

          <label for="bairro">Bairro</label>
          <input type="text" id="bairro" name="bairro" class="input01">

          <label for="localidade">Cidade</label>
          <input type="text" id="localidade" name="localidade" class="input01">

          <label for="uf">UF</label>
          <input type="text" id="uf" name="uf" class="input02" maxlength="2">

        </div>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" class="input01" placeholder="Digite seu e-mail" >

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" class="input02" maxlength="20" placeholder="Informe sua senha"
          >

        <div id="div-btns">
          <button type="submit" id="btn-add">
            Cadastrar
          </button>

          <button type="reset" id="btn-limpar">
            Limpar
          </button>
        </div>

      </form>

    </section>

    <footer id="rodape">
      <div id="dadosloja">
        <h2>Rua da creusa, 6767 - Bairro lagartixa</h2>
        <h1>Aracaju - Sergipe</h1>
      </div>

      <div id="icone_sociais">
        <ul>
          <li>
            <a href="https://www.instagram.com/seu_usuario"><img src="imagens/icones/instagram_logo.png"
                alt="instagram" /></a>
          </li>
          <li>
            <a href="https://www.facebook.com/seu_usuario"><img src="imagens/icones/facebook_logo.png"
                alt="facebook" /></a>
          </li>
        </ul>
        <div id="cartoes">
          <img src="imagens/icones/download.png" alt="hipercard" />
          <img src="imagens/icones/download.jpg" alt="mastercard" />
          <img src="imagens/icones/download (1).png" alt="visa" />
        </div>
      </div>
    </footer>
  </main>
</body>

</html>
