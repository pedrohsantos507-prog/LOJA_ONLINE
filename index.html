<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loja de computadores</title>

    <link rel="stylesheet" href="CSS/style_estrutura_pagina.css" />

    <link
      rel="icon"
      href="imagens/icones/logo_loja.png.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <main id="geral">
      <header id="cabecalho">
        <div id="logo">
          <a href="index.html">
            <img src="imagens/icones/logo_loja.png.png" alt="logo-loja" />
          </a>
        </div>
        <nav id="menu">
          <ul>
            <li>
              <a href="paginas/cadastro.html" class="link_menu">Cadastro</a>
            </li>
            <li><a href="paginas/sobre.html" class="link_menu">Sobre</a></li>
          </ul>
        </nav>

        <div id="div-icones">
          <ul>
            <li>
              <a href="paginas/login.html" class="link_icone"
                ><img src="imagens/icones/download (3).png" alt="logo-login"
              /></a>
            </li>
            <li>
              <a href="paginas/carrinho.html" class="link_icone"
                ><img src="imagens/icones/download (2).png" alt="logo-carrinho"
              /></a>
            </li>
          </ul>
        </div>
      </header>

      <section id="barra-pesquisa">
        <input
          type="text"
          name="pesquisa"
          id="pesquisa"
          placeholder="Digite seu produto"
        />
      </section>

      <section id="cards">
        <div class="card">
          <img src="imagens/images (8).jpg" alt="Cesto 01" class="img_card" />

          <h2 class="titulo_card">Cesto 01</h2>
          <h3 class="valor_card">R$ 1780,00</h3>
          <button class="btn_card">Adicionar</button>
        </div>

        <div class="card">
          <img src="imagens/images (9).jpg" alt="Cesto 02" class="img_card" />
          <h2 class="titulo_card">Cesto 02</h2>
          <h3 class="valor_card">R$ 3570,90</h3>
          <button class="btn_card">Adicionar</button>
        </div>

        <div class="card">
          <img src="imagens/images (6).jpg" alt="Cesto 03" class="img_card" />
          <h2 class="titulo_card">Cesto 03</h2>
          <h3 class="valor_card">R$ 3860,67</h3>
          <button class="btn_card">Adicionar</button>
        </div>

        <div class="card">
          <img src="imagens/images (11).jpg" alt="Cesto 04" class="img_card" />
          <h2 class="titulo_card">Cesto 04</h2>
          <h3 class="valor_card">R$ 2199,70</h3>
          <button class="btn_card">Adicionar</button>
        </div>

        <div class="card">
          <img src="imagens/images (12).jpg" alt="Cesto 05" class="img_card" />
          <h2 class="titulo_card">Cesto 05</h2>
          <h3 class="valor_card">R$ 250,00</h3>
          <button class="btn_card">Adicionar</button>
        </div>

        <div class="card">
          <img src="imagens/images.jpg" alt="Cesto 06" class="img_card" />
          <h2 class="titulo_card">Cesto 06</h2>
          <h3 class="valor_card">R$ 1235,50</h3>
          <button class="btn_card">Adicionar</button>
        </div>

        <div class="card">
          <img src="imagens/images (14).jpg" alt="Cesto 07" class="img_card" />
          <h2 class="titulo_card">Cesto 07</h2>
          <h3 class="valor_card">R$ 1899,60</h3>
          <button class="btn_card">Adicionar</button>
        </div>
      </section>

      <footer id="rodape">
        <div id="dadosloja">
          <h2>Rua da creusa, 6767 - Bairro lagartixa</h2>
          <h1>Aracaju - Sergipe</h1>
        </div>

        <div id="icone_sociais">
          <ul>
            <li>
              <a href="https://www.instagram.com/seu_usuario"
                ><img src="imagens/icones/instagram_logo.png" alt="instagram"
              /></a>
            </li>
            <li>
              <a href="https://www.facebook.com/seu_usuario"
                ><img src="imagens/icones/facebook_logo.png" alt="facebook"
              /></a>
            </li>
          </ul>
          <!----->
          <div id="cartoes">
            <img src="imagens/icones/download.png" alt="hipercard" />
            <img src="imagens/icones/download.jpg" alt="mastercard" />
            <img src="imagens/icones/download (1).png" alt="visa" />
          </div>
        </div>
      </footer>
    </main>
  </body>
</html>
